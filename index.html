// PURE pricing engine (unit-tested)
function calcPrice(rates, weightInputs, itemInputs, firstOrder) {
  let subtotal = 0; const lines = [];
  rates.weight.forEach(r => { const kg = parseFloat(weightInputs[r.key]) || 0;
    if (kg > 0) { const amt = kg*r.price; subtotal += amt; lines.push({label:`${r.label} — ${kg}kg × ${gbp(r.price)}`, amt}); } });
  rates.items.forEach(r => { const q = parseInt(itemInputs[r.key]) || 0;
    if (q > 0) { const amt = q*r.price; subtotal += amt; lines.push({label:`${r.label} × ${q}`, amt}); } });
  const discount = firstOrder ? subtotal*rates.firstOrderDiscount : 0;
  const afterDisc = subtotal - discount;
  const belowMin = afterDisc > 0 && afterDisc < rates.minOrder;
  const charged = belowMin ? rates.minOrder : afterDisc;
  return { lines, subtotal, discount, afterDisc, charged, belowMin };
}
// PURE order total from a stored weight charge + shop-added items (unit-tested)
function orderTotal(rates, weightCharge, addedItems, firstOrder) {
  let subtotal = weightCharge; const lines = [];
  rates.items.forEach(r => { const q = parseInt(addedItems[r.key]) || 0;
    if (q > 0) { const amt = q*r.price; subtotal += amt; lines.push({label:`${r.label} × ${q}`, amt}); } });
  const discount = firstOrder ? subtotal*rates.firstOrderDiscount : 0;
  const afterDisc = subtotal - discount;
  const belowMin = afterDisc > 0 && afterDisc < rates.minOrder;
  const charged = belowMin ? rates.minOrder : afterDisc;
  return { lines, subtotal, discount, charged, belowMin };
}
// PURE reorder helpers (unit-tested)
function reorderJobs(jobs, driverId, jobId, targetJobId) {
  const mine = jobs.filter(j=>j.driverId===driverId).sort((a,b)=>a.seq-b.seq);
  const others = jobs.filter(j=>j.driverId!==driverId);
  const from = mine.findIndex(j=>j.id===jobId);
  const to = mine.findIndex(j=>j.id===targetJobId);
  if (from<0 || to<0) return jobs;
  const arr = mine.slice(); const [moved] = arr.splice(from,1); arr.splice(to,0,moved);
  return [...others, ...arr.map((j,i)=>({...j, seq:i+1}))];
}
function moveJob(jobs, driverId, jobId, dir) {
  const mine = jobs.filter(j=>j.driverId===driverId).sort((a,b)=>a.seq-b.seq);
  const i = mine.findIndex(j=>j.id===jobId); const j = dir==='up'?i-1:i+1;
  if (i<0 || j<0 || j>=mine.length) return jobs;
  return reorderJobs(jobs, driverId, jobId, mine[j].id);
}
function moveJobTo(jobs, jobId, toDriverId, targetJobId) {
  const job = jobs.find(j=>j.id===jobId); if (!job) return jobs;
  if (job.driverId===toDriverId) return targetJobId ? reorderJobs(jobs, toDriverId, jobId, targetJobId) : jobs;
  const fromDriverId = job.driverId;
  const others = jobs.filter(j=>j.driverId!==fromDriverId && j.driverId!==toDriverId);
  const source = jobs.filter(j=>j.driverId===fromDriverId && j.id!==jobId).sort((a,b)=>a.seq-b.seq).map((j,i)=>({...j, seq:i+1}));
  const target = jobs.filter(j=>j.driverId===toDriverId).sort((a,b)=>a.seq-b.seq);
  let idx = targetJobId ? target.findIndex(j=>j.id===targetJobId) : target.length; if (idx<0) idx = target.length;
  const nt = target.slice(); nt.splice(idx,0,{...job, driverId:toDriverId});
  return [...others, ...source, ...nt.map((j,i)=>({...j, seq:i+1}))];
}

        <button onClick={()=>go('landing')} className="text-slate2 text-sm mb-4 inline-flex items-center gap-1"><Ic name="left" size={15}/>Back</button>
        <Logo h={30} />
        <h2 className="text-lg font-bold text-ink mt-4">{title}</h2>
        <p className="text-slate2 text-sm mb-4">{sub}</p>
        {children}
        <div className="mt-5 pt-4 border-t border-gray-100 text-[11px] text-slate2 flex items-start gap-1.5">
          <Ic name="info" size={13}/><span>Prototype for review — uses sample data and resets when you refresh. Nothing is saved or sent.</span>
        </div>
      </div>
    </div>
  );
}
function Field({ label, children, hint }) {
  return <div className="min-w-0"><label className="text-xs font-semibold text-slate2">{label}</label>{children}{hint&&<p className="text-[11px] text-slate2 mt-1">{hint}</p>}</div>;
}

function DriverLogin({ go, onLogin }) {
  const [driverId,setDriverId]=useState('d1'); const [pin,setPin]=useState(''); const [err,setErr]=useState('');
  const submit=()=>{ const d=DRIVERS.find(x=>x.id===driverId); if(pin!==d.pin){setErr('Incorrect PIN (hint: 1234)');return;} onLogin(d); };
  return (
    <LoginCard go={go} title="Driver sign in" sub="Each driver has their own login for the audit trail.">
      <Field label="Driver"><select value={driverId} onChange={e=>setDriverId(e.target.value)} className={inputCls+' mt-1 mb-3'}>
        {DRIVERS.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</select></Field>
      <Field label="PIN"><input value={pin} onChange={e=>{setPin(e.target.value);setErr('')}} type="password" placeholder="1234"
        className={inputCls+' mt-1'} onKeyDown={e=>e.key==='Enter'&&submit()} /></Field>
      {err && <p className="text-rose-500 text-xs mt-2">{err}</p>}
      <Btn onClick={submit} className="w-full mt-4">Log in</Btn>
    </LoginCard>
  );
}

function DriverApp({ driver, go, jobs, setJobs, rates, addAudit, addOrder, updateOrder }) {
  const [openId,setOpenId]=useState(null);
  const myJobs = jobs.filter(j=>j.driverId===driver.id).sort((a,b)=>a.seq-b.seq);
  const nextPendingId = (myJobs.find(j=>j.status==='pending')||{}).id;
  const done = myJobs.filter(j=>j.status!=='pending').length;
  const openJob = openId ? myJobs.find(j=>j.id===openId) : null;

  const completeCollection = (job, data) => {
    setJobs(prev => prev.map(j => j.id===job.id ? {...j, status:'done', doneAt:now(), ...data} : j));
    const c = custById(job.customerId);
    const patch = { services:[data.service], extras:data.extras, needsPricing:data.needsPricing,
      bagsCount:data.bagWeights.length, bagWeights:data.bagWeights, weight:data.weight,
      weightCharge:data.weightCharge, amount:data.amount, initialAmount:data.amount,
      paymentMethod:data.paymentMethod, collectedDate:TODAY, collectedAt:now(),
      status:data.needsPricing?'Needs pricing':'Collected',
      notes:[job.instructions,data.customerNotes,data.shirtCount?`Customer said ~${data.shirtCount} shirts (confirm at shop)`:''].filter(Boolean).join(' · ') };
    if (job.orderId) updateOrder(job.orderId, patch); // move the Pending Collection order to Collected
    else addOrder({ id:'ord'+Date.now(), customerId:job.customerId, addedItems:{}, firstOrder:data.firstOrder,
      packaging:job.packaging, paidInAdvance:job.paidInAdvance, dueDate:job.returnDate||addDays(TODAY,2), ...patch });
    const priceStr = data.needsPricing ? (data.amount>0?gbp(data.amount)+' (provisional)':'priced at shop') : gbp(data.amount);
    addAudit(`${driver.name} collected from ${fullName(c)} · ${priceStr} · ${data.paymentMethod}`);
    setOpenId(null);
  };
  const completeDelivery = (job, payment) => {
    setJobs(prev => prev.map(j => j.id===job.id ? {...j, status:'done', doneAt:now(), paymentMethod:payment} : j));
    addAudit(`${driver.name} delivered to ${fullName(custById(job.customerId))} · ${payment}`);
    setOpenId(null);
  };
  const markNoAnswer = (job) => {
    setJobs(prev => prev.map(j => j.id===job.id ? {...j, status:'no-answer', doneAt:now()} : j));
    if (job.orderId) updateOrder(job.orderId, {status:'No answer'});
    addAudit(`No answer at ${fullName(custById(job.customerId))} (${job.type}) — needs rescheduling`);
    setOpenId(null);
  };

  return (
    <div className="min-h-screen">
      <TopBar left={<Logo h={26}/>} right={
        <div className="flex items-center gap-3"><span className="text-sm text-ink font-semibold">{driver.name}</span>
          <Btn kind="ghost" icon="logout" onClick={()=>go('landing')} className="!py-1.5 !px-3">Log out</Btn></div>} />
      <div className="max-w-2xl mx-auto p-4">
        {!openJob && <>
          <div className="flex items-center justify-between mb-1">
            <h2 className="text-xl font-extrabold text-ink">Today’s run</h2>
            <Badge tone="grey">{done}/{myJobs.length} done</Badge>
          </div>
          <p className="text-slate2 text-sm mb-3">In driving order. <span className="text-rose-500 font-semibold">Pink = collection</span>, white = delivery. Next job highlighted; done jobs greyed out.</p>
          <div className="space-y-3">
            {myJobs.map(job => {
              const c = custById(job.customerId);
              const isDone = job.status==='done', isNoAnswer = job.status==='no-answer';
              const resolved = isDone || isNoAnswer;
              const isNext = job.id===nextPendingId;
              return (
                <div key={job.id} className={`rounded-2xl p-4 border transition card ${rowTint(job.type,resolved)} ${isNext?'ring-2 ring-teal':''}`}>
                  <div className="flex items-start justify-between gap-3">
                    <div className="flex gap-3">
                      <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shrink-0 ${resolved?'bg-gray-300 text-white':job.type==='collection'?'bg-rose-500 text-white':'bg-teal text-white'}`}>{job.seq}</div>
                      <div>
                        <div className="flex items-center gap-2 flex-wrap">
                          <TypeBadge type={job.type}/>
                          <span className="text-xs text-slate2 inline-flex items-center gap-1"><Ic name="clock" size={13}/>{job.window}</span>
                          {job.paidInAdvance && <Badge tone="green">Paid</Badge>}
                          {isDone && <span className="text-xs text-emerald-600 font-semibold inline-flex items-center gap-1"><Ic name="check" size={13}/>{job.doneAt}</span>}
                          {isNoAnswer && <Badge tone="rose">No answer</Badge>}
                        </div>
                        <div className="font-semibold text-ink mt-1">{fullName(c)}</div>
                        <div className="text-sm text-slate2">{c.addr}</div>
                        {job.type==='delivery'
                          ? <div className="text-xs text-slate2 mt-0.5 inline-flex items-center gap-1"><Ic name="box" size={13}/>{job.packaging}</div>
                          : job.returnDate && <div className="text-xs text-slate2 mt-0.5">Return {fmtDate(job.returnDate)}</div>}
                        {job.instructions && <div className="text-xs text-rose-700 mt-1 bg-rose-50 rounded-lg px-2 py-1 inline-flex items-start gap-1"><Ic name="note" size={13}/><span>{job.instructions}</span></div>}
                      </div>
                    </div>
                    {!resolved && <Btn kind={isNext?(job.type==='collection'?'rose':'primary'):'subtle'} onClick={()=>setOpenId(job.id)} className="!py-1.5 !px-3 shrink-0">Open</Btn>}
                  </div>
                </div>
              );
            })}
          </div>
        </>}

        {openJob && (openJob.type==='collection'
          ? <CollectionForm job={openJob} rates={rates} onBack={()=>setOpenId(null)} onConfirm={completeCollection} onNoAnswer={markNoAnswer} />
          : <DeliveryView job={openJob} onBack={()=>setOpenId(null)} onConfirm={completeDelivery} onNoAnswer={markNoAnswer} />)}
      </div>
    </div>
  );
}

function DirectionsBtn({ addr }) {
  return <a href={mapsUrl(addr)} target="_blank" rel="noopener"
    className="inline-flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-semibold bg-white border border-gray-200 text-ink hover:bg-gray-50">
    <Ic name="pin" size={16}/>Directions</a>;
}
function CallBtn({ mob }) {
  return <a href={`tel:${mob.replace(/\s/g,'')}`}
    className="inline-flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-semibold bg-white border border-gray-200 text-ink hover:bg-gray-50">
    <Ic name="phone" size={16}/>Call</a>;
}

function CollectionForm({ job, rates, onBack, onConfirm, onNoAnswer }) {
  const c = custById(job.customerId);
  const [bags,setBags]=useState([{id:1,weight:''}]);
  const [serviceKey,setServiceKey]=useState('iron');
  const [shirtType,setShirtType]=useState('io');
  const [shirtCount,setShirtCount]=useState('');
  const [extras,setExtras]=useState([]);
  const [firstOrder,setFirstOrder]=useState(false);
  const [payment,setPayment]=useState('Cash');
  const [notes,setNotes]=useState('');
  const [confirmed,setConfirmed]=useState(false);

  const isShirts = serviceKey==='shirts';
  const totalWeight = useMemo(()=>sum(bags.map(b=>b.weight)), [bags]);
  const result = useMemo(()=>calcPrice(rates, isShirts?{}:{[serviceKey]:totalWeight},{},firstOrder), [rates,serviceKey,isShirts,totalWeight,firstOrder]);
  const wsvc = rates.weight.find(r=>r.key===serviceKey);
  const svcLabel = isShirts ? `Shirt service (${shirtType==='io'?'iron only':'wash & iron'})` : wsvc.label.replace(/ \(.*\)/,'');
  const needsPricing = extras.length>0 || isShirts;
  const canConfirm = isShirts || result.charged>0;
  const confirmData = { bagWeights:isShirts?[]:bags.map(b=>parseFloat(b.weight)||0), weight:isShirts?0:totalWeight,
    service:svcLabel, weightCharge:isShirts?0:result.subtotal, amount:isShirts?0:result.charged, firstOrder,
    paymentMethod:payment, customerNotes:notes, extras, needsPricing, shirtCount:isShirts?shirtCount:'' };

  const addBag=()=>setBags(b=>[...b,{id:(b[b.length-1]?.id||0)+1,weight:''}]);
  const rmBag=id=>setBags(b=>b.length>1?b.filter(x=>x.id!==id):b);
  const setBagW=(id,v)=>setBags(b=>b.map(x=>x.id===id?{...x,weight:v}:x));
  const toggleExtra=x=>setExtras(e=>e.includes(x)?e.filter(y=>y!==x):[...e,x]);

  if (confirmed) return (
    <div className="bg-white card rounded-2xl p-8 text-center">
      <div className="w-16 h-16 mx-auto rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center"><Ic name="check" size={34} stroke={2.4}/></div>
      <h3 className="text-xl font-bold text-ink mt-3">Collection confirmed</h3>
      <p className="text-slate2 mt-1">{fullName(c)} · {isShirts?'priced at shop':gbp(result.charged)+(needsPricing?' (provisional)':'')} · {payment}</p>
      {needsPricing && <div className="bg-amber-50 text-amber-700 rounded-xl p-3 mt-4 text-sm inline-flex items-center gap-2"><Ic name="alert" size={16}/>{isShirts?`Shirts will be counted & priced at the shop${extras.length?`, along with ${extras.join(', ').toLowerCase()}`:''}.`:`Extras noted — shop will price ${extras.join(', ').toLowerCase()} and finalise the total.`}</div>}
      <div className="bg-teal-light text-teal-dark rounded-xl p-3 mt-3 text-sm flex items-center justify-center gap-2"><Ic name="mail" size={16}/>{needsPricing?'Provisional':'Receipt'} email sent to {c.email}</div>
      <div className="mt-6"><Btn icon="right" onClick={()=>onConfirm(job,confirmData)}>Back to run</Btn></div>
    </div>
  );

  return (
    <div>
      <button onClick={onBack} className="text-slate2 text-sm mb-3 inline-flex items-center gap-1"><Ic name="left" size={15}/>Back to run</button>
      <div className="bg-white card rounded-2xl p-5">
        <div className="flex items-start justify-between gap-2">
          <div><TypeBadge type="collection"/>
            <h3 className="text-lg font-bold text-ink mt-1">{fullName(c)}</h3>
            <p className="text-sm text-slate2">{c.addr}</p>
            {job.returnDate && <p className="text-xs text-slate2 mt-0.5">Return {fmtDate(job.returnDate)}</p>}
          </div>
          <div className="flex flex-col gap-2 shrink-0"><DirectionsBtn addr={c.addr}/><CallBtn mob={c.mob}/></div>
        </div>
        {job.instructions && <div className="text-xs text-rose-700 mt-3 bg-rose-50 rounded-lg px-2 py-1.5 inline-flex items-start gap-1"><Ic name="note" size={14}/><span>Boss note: {job.instructions}</span></div>}

        <hr className="my-4 border-gray-100"/>
        <h4 className="font-bold text-ink text-sm mb-1">Service</h4>
        <div className="space-y-1">
          {rates.weight.map(r=>(
            <label key={r.key} className="flex items-center gap-2 text-sm text-ink">
              <input type="radio" name="svc" checked={serviceKey===r.key} onChange={()=>setServiceKey(r.key)} className="accent-teal"/>
              {r.label} <span className="text-slate2">({gbp(r.price)}/kg)</span></label>))}
          <label className="flex items-center gap-2 text-sm text-ink">
            <input type="radio" name="svc" checked={isShirts} onChange={()=>setServiceKey('shirts')} className="accent-teal"/>
            Shirt service <span className="text-slate2">(counted at the shop)</span></label>
        </div>

        {!isShirts ? <>
          <div className="flex items-center justify-between mt-4">
            <h4 className="font-bold text-ink text-sm">Bags &amp; weight</h4>
            <Btn kind="subtle" icon="plus" onClick={addBag} className="!py-1 !px-2 text-xs">Add bag</Btn>
          </div>
          <div className="space-y-2 mt-2">
            {bags.map((b,i)=>(
              <div key={b.id} className="flex items-center gap-2">
                <span className="text-sm text-slate2 w-14">Bag {i+1}</span>
                <input type="number" min="0" step="0.1" value={b.weight} onChange={e=>setBagW(b.id,e.target.value)} className={inputCls+' !w-24 text-right'} placeholder="0.0"/>
                <span className="text-xs text-slate2">kg</span>
                {bags.length>1 && <button onClick={()=>rmBag(b.id)} className="text-rose-400 text-xs ml-1 hover:text-rose-600 inline-flex items-center gap-0.5"><Ic name="close" size={13}/>remove</button>}
              </div>
            ))}
            <div className="text-sm text-ink font-semibold pt-1">Total weight: {totalWeight.toFixed(1)} kg <span className="text-slate2 font-normal">across {bags.length} bag{bags.length>1?'s':''}</span></div>
          </div>
        </> : <>
          <div className="mt-3 bg-amber-50 border border-amber-100 rounded-xl p-3">
            <div className="text-sm font-semibold text-ink">Shirts — counted at the shop</div>
            <p className="text-xs text-amber-700 mb-2">No need to count or price on the doorstep. Just take the bag; the shop confirms the count.</p>
            <div className="space-y-1">
              <label className="flex items-center gap-2 text-sm text-ink"><input type="radio" name="shirt" checked={shirtType==='io'} onChange={()=>setShirtType('io')} className="accent-teal"/>Iron only <span className="text-slate2">(£2.00/shirt)</span></label>
              <label className="flex items-center gap-2 text-sm text-ink"><input type="radio" name="shirt" checked={shirtType==='wi'} onChange={()=>setShirtType('wi')} className="accent-teal"/>Wash &amp; iron <span className="text-slate2">(£3.00/shirt)</span></label>
            </div>
            <div className="flex items-center gap-2 mt-2">
              <span className="text-sm text-slate2">Shirts (only if the customer gave a number)</span>
              <input type="number" min="0" step="1" value={shirtCount} onChange={e=>setShirtCount(e.target.value)} className={inputCls+' !w-20 text-right'} placeholder="—"/>
            </div>
          </div>
        </>}

        <h4 className="font-bold text-ink text-sm mt-4 mb-1">Extras in the bag <span className="text-slate2 font-normal">— priced at the shop</span></h4>
        <p className="text-xs text-slate2 mb-2">Just tick what the customer says is in there. No need to unpack or price it at the door.</p>
        <div className="flex flex-wrap gap-2">
          {EXTRA_TYPES.map(x=>(
            <button key={x} onClick={()=>toggleExtra(x)}
              className={`inline-flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-semibold border transition ${extras.includes(x)?'bg-amber-50 border-amber-300 text-amber-700':'bg-white border-gray-200 text-slate2 hover:border-gray-300'}`}>
              {extras.includes(x)&&<Ic name="check" size={13}/>}{x}</button>))}
        </div>
        {needsPricing && <div className="text-xs text-amber-700 bg-amber-50 rounded-lg px-2 py-1.5 mt-2 inline-flex items-center gap-1"><Ic name="alert" size={14}/>{isShirts?'Shirts and any extras are counted & priced at the shop.':'Price below is provisional — shop finalises it.'}</div>}

        <label className="flex items-center gap-2 mt-3 text-sm text-ink">
          <input type="checkbox" checked={firstOrder} onChange={e=>setFirstOrder(e.target.checked)} className="accent-teal"/> Apply first-order discount (10%)</label>

        <h4 className="font-bold text-ink text-sm mt-4 mb-1">Payment</h4>
        <div className="flex gap-4">
          {['Cash','Bank transfer'].map(m=>(
            <label key={m} className="flex items-center gap-1.5 text-sm text-ink">
              <input type="radio" name="pay" checked={payment===m} onChange={()=>setPayment(m)} className="accent-teal"/> {m}</label>))}
        </div>

        <h4 className="font-bold text-ink text-sm mt-4 mb-1">Customer notes <span className="text-slate2 font-normal">(seen by boss &amp; store team)</span></h4>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows="2" placeholder="e.g. stain on white shirt collar, handle silk gently…" className={inputCls}></textarea>

        <div className="bg-gray-50 rounded-xl p-4 mt-4">
          {isShirts
            ? <p className="text-slate2 text-sm">Shirts are counted and priced at the shop.</p>
            : result.lines.length===0
              ? <p className="text-slate2 text-sm">Enter bag weights to calculate the price…</p>
              : <div className="space-y-1">
                  {result.lines.map((l,i)=>(<div key={i} className="flex justify-between text-sm text-slate2"><span>{l.label}</span><span>{gbp(l.amt)}</span></div>))}
                  {result.discount>0 && <div className="flex justify-between text-sm text-emerald-600"><span>First-order discount</span><span>−{gbp(result.discount)}</span></div>}
                  {result.belowMin && <div className="flex justify-between text-xs text-amber-600"><span>Below {gbp(rates.minOrder)} minimum — rounded up</span><span></span></div>}
                </div>}
          <div className="flex justify-between items-center mt-2 pt-2 border-t border-gray-200">
            <span className="font-bold text-ink">{(isShirts||needsPricing)?'Provisional total':'Total to charge'}</span>
            <span className="text-2xl font-extrabold text-teal-dark">{isShirts?'At shop':gbp(result.charged)}</span></div>
        </div>

        <Btn kind="green" className="w-full mt-4" onClick={()=>setConfirmed(true)} {...(!canConfirm?{disabled:true}:{})}>
          Confirm collection{!isShirts&&result.charged>0?` · ${gbp(result.charged)}`:''}</Btn>
        <button onClick={()=>onNoAnswer(job)} className="w-full mt-2 border-2 border-rose-200 bg-white text-rose-600 rounded-xl py-2 text-sm font-semibold inline-flex items-center justify-center gap-1.5 hover:bg-rose-50 transition"><Ic name="alert" size={15}/>No answer — reschedule</button>
      </div>
    </div>
  );
}

                <label className="flex items-center gap-1.5 text-sm text-ink"><input type="radio" name="dpay" checked={payment==='Online'} onChange={()=>setPayment('Online')} className="accent-teal"/> Paying online</label>
              </div>
            </>}
        <Btn kind="green" icon="check" className="w-full mt-4" onClick={()=>onConfirm(job, paid?'Paid in advance':payment)}>Confirm bags delivered</Btn>
        <button onClick={()=>onNoAnswer(job)} className="w-full mt-2 border-2 border-rose-200 bg-white text-rose-600 rounded-xl py-2 text-sm font-semibold inline-flex items-center justify-center gap-1.5 hover:bg-rose-50 transition"><Ic name="alert" size={15}/>No answer — reschedule</button>
      </div>
    </div>
  );
}

const LIFECYCLE = ['Pending Collection','Collected','In Shop','Ready','Delivered'];
const statusToStep = s => ({ 'Pending Collection':0,'No answer':0,'Booked':0,'Needs pricing':1,'Collected':1,'In Shop':2,'In progress':2,'Ready':3,'Delivered':4 }[s] ?? 1);
const NEXT_STATUS = { 'Collected':'In Shop', 'In Shop':'Ready', 'Ready':'Delivered' };
function statusTone(s){ return s==='Ready'?'green':s==='In Shop'?'amber':s==='Collected'?'teal':s==='Needs pricing'?'rose':s==='No answer'?'rose':s==='Pending Collection'?'slate':'grey'; }

function Timeline({ status }) {
  const active = statusToStep(status);
  return (
    <div className="mt-1">
      {LIFECYCLE.map((step,i)=>{
        const doneStep = i<active, cur = i===active;
        return (
          <div key={step} className="flex gap-3">
            <div className="flex flex-col items-center">
              <div className={`w-3.5 h-3.5 rounded-full border-2 ${cur?'bg-teal border-teal':doneStep?'bg-teal-dark border-teal-dark':'bg-white border-gray-300'}`}></div>
              {i<LIFECYCLE.length-1 && <div className={`w-0.5 flex-1 min-h-[18px] ${doneStep?'bg-teal-dark':'bg-gray-200'}`}></div>}
            </div>
            <div className={`text-sm pb-2 ${cur?'text-ink font-semibold':doneStep?'text-slate2':'text-gray-300'}`}>{step}
              {cur && status==='Needs pricing' && <span className="ml-2"><Badge tone="rose">Needs pricing</Badge></span>}</div>
          </div>);
      })}
    </div>
  );
}

function OrderModal({ order, rates, onClose, onSave, addAudit }) {
  const c = custById(order.customerId);
  const [pricing,setPricing]=useState(order.needsPricing);
  const [added,setAdded]=useState(order.addedItems||{});
  const groups = useMemo(()=>{ const g={}; rates.items.forEach(r=>{(g[r.group]=g[r.group]||[]).push(r)}); return g; },[rates]);
  const calc = useMemo(()=>orderTotal(rates, order.weightCharge, added, order.firstOrder), [rates,order,added]);

  const save = () => {
    onSave(order.id, { addedItems:added, amount:calc.charged, needsPricing:false,
      status: order.status==='Needs pricing'?'In Shop':order.status });
    addAudit(`Shop priced ${fullName(c)}: ${gbp(order.initialAmount)} → ${gbp(calc.charged)}`);
    onClose();
  };
  const advance = () => { const ns=NEXT_STATUS[order.status]; if(!ns) return;
    onSave(order.id, { status:ns }); addAudit(`${fullName(c)}'s order marked ${ns}`); };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[92vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>

          <div><h3 className="text-lg font-bold text-ink">{fullName(c)}</h3><p className="text-sm text-slate2">{c.addr}</p></div>
          <button onClick={onClose} className="text-slate2 hover:text-ink"><Ic name="close" size={20}/></button>
        </div>
        <div className="p-5 grid md:grid-cols-2 gap-5">
          <div>
            <h4 className="font-bold text-ink text-sm mb-2">Order details</h4>
            <div className="text-sm space-y-1.5">
              <Row k="Services" v={order.services.join(', ')}/>
              {order.extras.length>0 && <Row k="Extras" v={<span className="text-amber-700">{order.extras.join(', ')}</span>}/>}
              <Row k="Bags" v={order.bagsCount>0?`${order.bagsCount} · ${order.bagWeights.join('+')}kg = ${order.weight}kg`:'—'}/>
              <Row k="Packaging" v={order.packaging}/>
              <Row k="Collected" v={order.collectedDate?`${fmtDate(order.collectedDate)} · ${order.collectedAt}`:'Not yet collected'}/>
              <Row k="Deliver by" v={fmtDate(order.dueDate)}/>
              <Row k="Payment" v={order.paidInAdvance?'Paid in advance':(order.paymentMethod==='—'?'—':order.paymentMethod)}/>
              <Row k="Price" v={order.status==='Pending Collection'?'—':<span className="font-bold text-ink">{gbp(order.amount)}{order.needsPricing&&<span className="text-rose-500 font-normal"> (provisional)</span>}</span>}/>
            </div>
            {order.notes && <div className="text-xs text-ink mt-3 bg-amber-50 border border-amber-100 rounded-lg px-2 py-1.5 flex items-start gap-1"><Ic name="note" size={14}/><span>{order.notes}</span></div>}
            <h4 className="font-bold text-ink text-sm mt-5 mb-1">Progress</h4>
            <Timeline status={order.status}/>
            {order.status==='Pending Collection' &&
              <p className="text-xs text-slate2 mt-2 inline-flex items-center gap-1"><Ic name="clock" size={14}/>Awaiting driver collection.</p>}
            {order.status==='No answer' &&
              <p className="text-xs text-rose-600 mt-2 inline-flex items-center gap-1"><Ic name="alert" size={14}/>No answer at the door — needs rescheduling.</p>}
            {order.needsPricing &&
              <p className="text-xs text-rose-600 mt-2 inline-flex items-center gap-1"><Ic name="alert" size={14}/>Price the extras before advancing.</p>}
            {NEXT_STATUS[order.status] && !order.needsPricing &&
              <Btn kind="dark" icon="right" className="mt-3 w-full" onClick={advance}>Mark {NEXT_STATUS[order.status]}</Btn>}
          </div>

          <div>
            <div className="flex items-center justify-between mb-2">
              <h4 className="font-bold text-ink text-sm">Pricing</h4>
              {!pricing && <Btn kind="subtle" icon="edit" className="!py-1 !px-2 text-xs" onClick={()=>setPricing(true)}>Amend price</Btn>}
            </div>
            {order.needsPricing && <div className="text-xs text-rose-600 bg-rose-50 rounded-lg px-2 py-1.5 mb-2 inline-flex items-center gap-1"><Ic name="alert" size={14}/>Driver flagged extras — add them to finalise the price.</div>}
            {!pricing
              ? <div className="text-sm text-slate2">Current total <span className="font-bold text-ink">{gbp(order.amount)}</span>. Tap <b>Amend price</b> to add dry cleaning, bedding or repairs found in the bag.</div>
              : <>
                  <div className="bg-gray-50 rounded-xl p-3 text-sm mb-3">
                    <div className="flex justify-between text-slate2"><span>Weight-based ({order.services[0]})</span><span>{gbp(order.weightCharge)}</span></div>
                  </div>
                  <div className="max-h-56 overflow-y-auto pr-1">
                    {Object.entries(groups).map(([g,list])=>(
                      <div key={g} className="mb-2">
                        <div className="text-[11px] font-semibold text-teal-dark uppercase tracking-wide mb-1">{g}</div>
                        {list.map(r=>(
                          <div key={r.key} className="flex items-center justify-between gap-2 py-0.5">
                            <span className="text-sm text-ink">{r.label.replace(/^Dry clean — /,'')} <span className="text-slate2">{gbp(r.price)}</span></span>
                            <input type="number" min="0" step="1" value={added[r.key]||''} onChange={e=>setAdded({...added,[r.key]:e.target.value})} className={inputCls+' !w-16 text-right !py-1'} placeholder="0"/>
                          </div>))}
                      </div>))}
                  </div>
                  <div className="bg-teal-light rounded-xl p-3 mt-2">
                    {calc.lines.map((l,i)=>(<div key={i} className="flex justify-between text-sm text-teal-dark"><span>{l.label}</span><span>{gbp(l.amt)}</span></div>))}
                    <div className="flex justify-between items-center mt-1 pt-1 border-t border-teal/30">
                      <span className="font-bold text-ink">New total</span><span className="text-xl font-extrabold text-teal-dark">{gbp(calc.charged)}</span></div>
                  </div>
                  <Btn kind="primary" icon="check" className="w-full mt-3" onClick={save}>Save &amp; notify customer</Btn>
                  <p className="text-[11px] text-slate2 text-center mt-1.5">Logged to the audit trail; customer emailed the updated total.</p>
                </>}
          </div>
        </div>
      </div>
    </div>
  );
}
function Row({ k, v }) { return <div className="flex justify-between gap-4"><span className="text-slate2">{k}</span><span className="text-ink text-right">{v}</span></div>; }

function StoreApp({ go, orders, rates, updateOrder, addAudit }) {
  const [scope,setScope]=useState('today');

    const inShop = o => ['Collected','Needs pricing','In Shop','Ready'].includes(o.status); // garments physically in the shop
    const f = orders.filter(o => inShop(o) && (scope==='today' ? o.dueDate===TODAY : withinWeek(o.dueDate)));
    return [...f].sort((a,b)=> a.dueDate.localeCompare(b.dueDate) || (a.collectedAt||'').localeCompare(b.collectedAt||''));

  const printList = () => {
    const rows = list.map(o=>{ const c=custById(o.customerId);

        <td>${o.bagsCount} (${o.bagWeights.join('+')}kg) · ${o.weight}kg</td>
        <td>${gbp(o.amount)}${o.needsPricing?' <b>(prov.)</b>':''}<br><span class="a">${o.paidInAdvance?'PAID':o.paymentMethod}</span></td>
        <td>${o.packaging}</td><td>${fmtDate(o.collectedDate)} ${o.collectedAt}</td><td>${o.status}</td><td>${o.notes||''}</td></tr>`; }).join('');
    const html = `<html><head><title>NELIS — ${scope==='today'?'Today':'This week'}</title>
      <style>body{font-family:Arial;padding:18px;color:#1f2a30}h1{font-size:16px;margin:0}.sub{color:#777;font-size:12px;margin:2px 0 12px}
      table{width:100%;border-collapse:collapse;font-size:11px}th{background:#3AAFCB;color:#fff;text-align:left;padding:5px 6px}
      td{border-bottom:1px solid #ddd;padding:5px 6px;vertical-align:top}.a{color:#888;font-size:10px}@media print{@page{size:landscape;margin:10mm}}</style></head>
      <body><h1>NEL Ironing Service — Production list</h1><div class="sub">${scope==='today'?'Due today':'Due this week'} · printed ${fmtDate(TODAY)} · ${list.length} order(s)</div>
      <table><thead><tr><th>Due</th><th>Customer</th><th>Services</th><th>Bags / weight</th><th>Price</th><th>Pack</th><th>Collected</th><th>Status</th><th>Notes</th></tr></thead>
      <tbody>${rows}</tbody></table></body></html>`;
    const w = window.open('','_blank'); if(!w){alert('Please allow pop-ups to print the list.');return;}
    w.document.write(html); w.document.close(); w.focus(); setTimeout(()=>w.print(),300);
  };

  return (
    <div className="min-h-screen">
      <TopBar left={<Logo h={26}/>} right={
        <div className="flex items-center gap-3"><span className="text-sm text-ink font-semibold hidden sm:inline">Store team</span>
          <Btn kind="ghost" icon="logout" onClick={()=>go('landing')} className="!py-1.5 !px-3">Log out</Btn></div>} />
      <div className="max-w-5xl mx-auto p-4">
        <div className="flex items-center justify-between mb-1 flex-wrap gap-2">
          <h2 className="text-xl font-extrabold text-ink">Production list</h2>
          <div className="flex items-center gap-2">
            <div className="bg-white rounded-xl p-1 card flex">
              {[['today','Today'],['week','This week']].map(([k,l])=>(
                <button key={k} onClick={()=>setScope(k)} className={`px-3 py-1.5 rounded-lg text-sm font-semibold ${scope===k?'bg-teal text-white':'text-slate2'}`}>{l}</button>))}
            </div>
            <Btn kind="ghost" icon="printer" onClick={printList}>Print / PDF</Btn>
          </div>
        </div>
        <p className="text-slate2 text-sm mb-4">Sorted by soonest due first, so you know which bags to deal with first. Tap an order for full details and to price extras.</p>

        {list.length===0 ? <div className="bg-white card rounded-2xl p-8 text-center text-slate2">Nothing due {scope==='today'?'today':'this week'}.</div>
        : <div className="space-y-3">

              return (
                <button key={o.id} onClick={()=>setSel(o)} className={`w-full text-left bg-white card rounded-2xl p-4 border-l-4 hover:ring-2 hover:ring-teal/40 transition ${o.needsPricing?'border-rose-400':dueToday?'border-teal':'border-gray-200'}`}>
                  <div className="flex flex-wrap items-start justify-between gap-3">
                    <div className="min-w-[180px]">
                      <div className="flex items-center gap-2 flex-wrap">
                        <Badge tone={dueToday?'teal':'grey'}>Due {fmtDate(o.dueDate)}</Badge>
                        <Badge tone={statusTone(o.status)}>{o.status}</Badge>

                      <span className="text-slate2">Services</span><span className="text-ink text-right">{o.services.join(', ')}</span>
                      <span className="text-slate2">Bags</span><span className="text-ink text-right">{o.bagsCount} · {o.weight}kg</span>
                      <span className="text-slate2">Price</span><span className="text-ink text-right">{gbp(o.amount)}{o.needsPricing?' (prov.)':''}</span>
                      <span className="text-slate2">Collected</span><span className="text-ink text-right">{fmtDate(o.collectedDate)} · {o.collectedAt}</span>
                    </div>
                  </div>
                  {o.notes && <div className="text-xs text-ink mt-2 bg-amber-50 border border-amber-100 rounded-lg px-2 py-1 inline-flex items-start gap-1"><Ic name="note" size={13}/><span>{o.notes}</span></div>}
                </button>);
            })}
          </div>}
      </div>
      {sel && <OrderModal order={orders.find(o=>o.id===sel.id)||sel} rates={rates} onClose={()=>setSel(null)} onSave={updateOrder} addAudit={addAudit}/>}
    </div>
  );
}

        <div className="flex gap-2 mt-5">
          <Btn kind="ghost" onClick={onClose} className="flex-1">Cancel</Btn>
          <Btn kind="rose" icon="plus" onClick={create} className="flex-1" {...(!customerId?{disabled:true}:{})}>Add to run</Btn>
        </div>
      </div>
    </div>
  );
}

function Stat({ label, value, onClick }) {
  const inner = <><div className="text-2xl font-extrabold text-ink">{value}</div>
    <div className="text-xs text-slate2 mt-0.5 inline-flex items-center gap-1">{label}{onClick&&<Ic name="right" size={12} className="text-teal-dark"/>}</div></>;
  return onClick
    ? <button onClick={onClick} className="bg-white card rounded-2xl p-4 text-left w-full hover:ring-2 hover:ring-teal/40 transition">{inner}</button>
    : <div className="bg-white card rounded-2xl p-4">{inner}</div>;
}
function Overview({ jobs, orders, audit, onNew, goStat }) {
  const done = jobs.filter(j=>j.status==='done');
  const revenue = done.reduce((s,j)=>s+(j.amount||0),0);
  const cols = jobs.filter(j=>j.type==='collection').length;
  const needp = orders.filter(o=>o.needsPricing).length;
  return (
    <div>
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
        <Stat label="Customers" value={CUSTOMERS.length} onClick={()=>goStat('customers')}/>
        <Stat label="Jobs today" value={jobs.length} onClick={()=>goStat('jobs')}/>
        <Stat label="Collections / deliveries" value={`${cols} / ${jobs.length-cols}`} onClick={()=>goStat('jobs')}/>
        <Stat label="Awaiting shop pricing" value={needp} onClick={()=>goStat('pricing')}/>
      </div>
      <div className="bg-white card rounded-2xl p-4">
        <div className="flex items-center justify-between mb-2">
          <h3 className="font-bold text-ink">Audit trail</h3>
          <Btn kind="subtle" icon="plus" onClick={onNew} className="!py-1 !px-3 text-xs">New job</Btn>
        </div>
        <p className="text-xs text-slate2 mb-3">Who did what, and when. Updates live as drivers confirm jobs and the shop prices extras.</p>
        {audit.length===0 ? <p className="text-sm text-slate2">No activity yet. Log in as a driver and confirm a job, or price an order as the store team, to see it here.</p>
          : <div className="space-y-2">{audit.map((a,i)=>{ const alert=/^No answer/.test(a.text); return (
              <div key={i} className={`flex gap-3 text-sm border-b border-gray-50 last:border-0 pb-2 ${alert?'bg-rose-50 -mx-2 px-2 rounded-lg':''}`}>
                <span className={`tabular-nums ${alert?'text-rose-500':'text-slate2'}`}>{a.time}</span>
                <span className={alert?'text-rose-600 font-semibold inline-flex items-start gap-1':'text-ink'}>{alert&&<Ic name="alert" size={14} className="mt-0.5 shrink-0"/>}{a.text}</span>
              </div>);})}</div>}
      </div>
    </div>
  );
}
function TableWrap({ head, children }) {
  return <div className="bg-white card rounded-2xl overflow-x-auto">
    <table className="w-full text-sm"><thead><tr className="bg-gray-50 text-left text-xs text-slate2 uppercase tracking-wide">
      {head.map(h=><th key={h} className="px-4 py-2.5 font-semibold whitespace-nowrap">{h}</th>)}</tr></thead><tbody>{children}</tbody></table></div>;
}
function Customers() {
  return (<div>
    <div className="flex justify-between items-center mb-3"><h3 className="font-bold text-ink">Customers</h3>
      <Btn kind="subtle" icon="plus" onClick={()=>alert('In the full build this opens an add-customer form (mock).')}>Add customer</Btn></div>
    <div className="space-y-2">
      {CUSTOMERS.map(c=>(
        <div key={c.id} className="bg-white card rounded-2xl p-3.5">
          <div className="font-semibold text-ink">{fullName(c)}</div>
          <div className="text-sm text-slate2 mt-0.5 flex items-start gap-1.5"><Ic name="pin" size={14} className="mt-0.5 shrink-0"/>{c.addr}</div>
          <div className="flex flex-wrap gap-x-4 gap-y-1 mt-1.5 text-sm text-slate2">
            <a href={`tel:${c.mob.replace(/\s/g,'')}`} className="inline-flex items-center gap-1.5 text-teal-dark font-medium"><Ic name="phone" size={14}/>{c.mob}</a>
            <span className="inline-flex items-center gap-1.5 truncate"><Ic name="mail" size={14} className="shrink-0"/>{c.email}</span>
          </div>
        </div>))}
    </div></div>);
}
function Orders({ orders, rates, updateOrder, addAudit, filter, onClearFilter }) {
  const [sel,setSel]=useState(null);
  const base = filter==='needsPricing' ? orders.filter(o=>o.needsPricing) : orders;
  const sorted=[...base].sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  return (<div>
    <div className="flex items-center justify-between mb-3">
      <h3 className="font-bold text-ink">{filter==='needsPricing'?'Orders awaiting pricing':'Orders in the shop'}</h3>
      {filter==='needsPricing' && <button onClick={onClearFilter} className="text-sm text-teal-dark font-semibold inline-flex items-center gap-1"><Ic name="left" size={14}/>Show all</button>}
    </div>
    <div className="space-y-2">
      {sorted.length===0 && <div className="bg-white card rounded-2xl p-8 text-center text-slate2">No orders awaiting pricing right now.</div>}
      {sorted.map(o=>{ const c=custById(o.customerId); return (
        <button key={o.id} onClick={()=>setSel(o)} className="w-full text-left bg-white card rounded-2xl p-3.5 hover:ring-2 hover:ring-teal/40 transition">
          <div className="flex items-center justify-between gap-2">
            <span className="font-semibold text-ink truncate">{fullName(c)}</span>
            <Badge tone={statusTone(o.status)}>{o.status}</Badge>
          </div>
          <div className="flex items-center justify-between gap-2 mt-1 text-sm">
            <span className="text-slate2 truncate">{o.services.join(', ')}{o.extras.length?<span className="text-amber-600"> +{o.extras.length}</span>:''}</span>
            <span className="text-slate2 shrink-0">{o.bagsCount} · {o.weight}kg</span>
          </div>
          <div className="flex items-center justify-between gap-2 mt-1.5 text-sm">
            <span className="font-bold text-ink inline-flex items-center gap-2">{gbp(o.amount)}{o.needsPricing&&<span className="text-rose-500 font-normal text-xs">prov.</span>}{o.paidInAdvance&&<Badge tone="green">Paid</Badge>}</span>
            <span className="text-slate2 text-xs inline-flex items-center gap-1"><Ic name="clock" size={13}/>Due {fmtDate(o.dueDate)}</span>
          </div>
        </button>);})}
    </div>
    <p className="text-xs text-slate2 mt-2">Tap an order to view details or amend the price. “prov.” = provisional, extras still to be added at the shop.</p>
    {sel && <OrderModal order={orders.find(o=>o.id===sel.id)||sel} rates={rates} onClose={()=>setSel(null)} onSave={updateOrder} addAudit={addAudit}/>}
  </div>);
}
function Pricing({ rates, setRates }) {
  const setW=(k,v)=>setRates({...rates,weight:rates.weight.map(r=>r.key===k?{...r,price:parseFloat(v)||0}:r)});
  const setI=(k,v)=>setRates({...rates,items:rates.items.map(r=>r.key===k?{...r,price:parseFloat(v)||0}:r)});
  return (<div>
    <h3 className="font-bold text-ink mb-1">Pricing</h3>
    <p className="text-xs text-slate2 mb-3">Edit rates — the driver's calculator and the shop's amend-price tool update instantly.</p>
    <div className="grid md:grid-cols-2 gap-4">
      <div className="bg-white card rounded-2xl p-4">
        <h4 className="font-bold text-ink text-sm mb-2">Weight-based (per kg)</h4>
        {rates.weight.map(r=>(<div key={r.key} className="flex items-center justify-between py-1">
          <span className="text-sm text-ink">{r.label}</span>
          <div className="flex items-center gap-1"><span className="text-slate2 text-sm">£</span>
            <input type="number" step="0.5" value={r.price} onChange={e=>setW(r.key,e.target.value)} className={inputCls+' !w-20 text-right !py-1'}/></div></div>))}
        <div className="mt-3 pt-3 border-t border-gray-100 text-sm flex justify-between"><span className="text-slate2">Minimum order</span><span className="font-semibold text-ink">{gbp(rates.minOrder)}</span></div>
        <div className="text-sm flex justify-between"><span className="text-slate2">First-order discount</span><span className="font-semibold text-ink">{Math.round(rates.firstOrderDiscount*100)}%</span></div>
      </div>
      <div className="bg-white card rounded-2xl p-4">
        <h4 className="font-bold text-ink text-sm mb-2">Per-item</h4>
        <div className="max-h-80 overflow-y-auto pr-1">
          {rates.items.map(r=>(<div key={r.key} className="flex items-center justify-between py-1">
            <span className="text-sm text-ink">{r.label}</span>
            <div className="flex items-center gap-1"><span className="text-slate2 text-sm">£</span>
              <input type="number" step="0.5" value={r.price} onChange={e=>setI(r.key,e.target.value)} className={inputCls+' !w-20 text-right !py-1'}/></div></div>))}
        </div>
      </div>
    </div></div>);
}
function DriversAdmin({ drivers, setDrivers }) {
  const [name,setName]=useState('');
  const add=()=>{ if(!name.trim())return; setDrivers([...drivers,{id:'d'+(drivers.length+1),name:name.trim(),pin:'1234'}]); setName(''); };
  return (<div><h3 className="font-bold text-ink mb-3">Drivers</h3>
    <div className="bg-white card rounded-2xl p-4 mb-3 flex gap-2 items-end">
      <div className="flex-1"><Field label="Enrol new driver"><input value={name} onChange={e=>setName(e.target.value)} placeholder="Full name" className={inputCls+' mt-1'} onKeyDown={e=>e.key==='Enter'&&add()}/></Field></div>
      <Btn icon="plus" onClick={add}>Add driver</Btn></div>
    <TableWrap head={['Driver','Login PIN','Status']}>
      {drivers.map(d=>(<tr key={d.id} className="border-t border-gray-50 hover:bg-gray-50">
        <td className="px-4 py-2.5 font-medium text-ink">{d.name}</td><td className="px-4 py-2.5 text-slate2">{d.pin}</td>
        <td className="px-4 py-2.5"><Badge tone="green">Active</Badge></td></tr>))}
    </TableWrap></div>);
}
function Logistics({ jobs, setJobs, drivers, onNew }) {
  const [drag,setDrag]=useState(null);
  const move=(driverId,jobId,dir)=>setJobs(prev=>moveJob(prev,driverId,jobId,dir));
  const dropOnJob=(toDriverId,targetId)=>{ if(drag) setJobs(prev=>moveJobTo(prev,drag.jobId,toDriverId,targetId)); setDrag(null); };
  const dropOnColumn=(toDriverId)=>{ if(drag) setJobs(prev=>moveJobTo(prev,drag.jobId,toDriverId,null)); setDrag(null); };
  const reassign=(jobId,toDriverId)=>setJobs(prev=>moveJobTo(prev,jobId,toDriverId,null));
  return (
    <div>
      <div className="flex items-center justify-between mb-1 flex-wrap gap-2">
        <h3 className="font-bold text-ink">Logistics &amp; route planning</h3>
        <Btn kind="rose" icon="plus" onClick={onNew} className="!py-1.5 !px-3">New job</Btn>
      </div>
      <p className="text-xs text-slate2 mb-3">Each driver's collections + deliveries for today. Drag a card to reorder <b>or drop it on the other driver</b> to reassign — or use the <b>Move to</b> menu. Chevrons nudge within a driver. <span className="text-rose-500 font-semibold">Pink = collection</span>, white = delivery.</p>
      <div className="grid md:grid-cols-2 gap-4">
        {drivers.map(d=>{
          const list=jobs.filter(j=>j.driverId===d.id).sort((a,b)=>a.seq-b.seq);
          const isDropTarget = drag && drag.fromDriverId!==d.id;
          return (
            <div key={d.id}
              onDragOver={e=>{ if(isDropTarget){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); } }}
              onDragLeave={e=>e.currentTarget.classList.remove('drag-over')}
              onDrop={e=>{ e.currentTarget.classList.remove('drag-over'); dropOnColumn(d.id); }}
              className="bg-white card rounded-2xl p-4">
              <h4 className="font-bold text-ink text-sm mb-2 inline-flex items-center gap-1.5"><Ic name="truck" size={16}/>{d.name} <span className="text-slate2 font-normal">· {list.length} stops</span>
                {isDropTarget && <span className="text-teal-dark text-xs font-normal ml-1">— drop to reassign</span>}</h4>
              {list.length===0 ? <p className="text-sm text-slate2 border-2 border-dashed border-gray-200 rounded-xl p-4 text-center">No route assigned{isDropTarget?' — drop a job here':''}.</p> :
                <div className="space-y-2">
                  {list.map((j,idx)=>{ const c=custById(j.customerId);
                    return (
                      <div key={j.id} draggable onDragStart={()=>setDrag({fromDriverId:d.id,jobId:j.id})} onDragEnd={()=>setDrag(null)}
                        onDragOver={e=>{e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.add('drag-over');}}
                        onDragLeave={e=>e.currentTarget.classList.remove('drag-over')}
                        onDrop={e=>{e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.remove('drag-over'); dropOnJob(d.id,j.id);}}
                        className={`rounded-xl border px-2 py-2 cursor-move ${j.type==='collection'?'bg-rose-50/70 border-rose-100':'bg-white border-gray-100'}`}>
                        <div className="flex items-center gap-2">
                          <span className="text-gray-300"><Ic name="grip" size={16}/></span>
                          <span className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold text-white shrink-0 ${j.type==='collection'?'bg-rose-500':'bg-teal'}`}>{j.seq}</span>
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-1.5"><TypeBadge type={j.type}/><span className="text-xs text-slate2">{j.window}</span></div>
                            <div className="text-sm text-ink truncate">{fullName(c)}</div>
                            <div className="text-xs text-slate2 truncate">{c.addr}</div>
                          </div>
                          <div className="flex flex-col text-slate2">
                            <button onClick={()=>move(d.id,j.id,'up')} disabled={idx===0} className={idx===0?'text-gray-200':'hover:text-teal'}><Ic name="up" size={16}/></button>
                            <button onClick={()=>move(d.id,j.id,'down')} disabled={idx===list.length-1} className={idx===list.length-1?'text-gray-200':'hover:text-teal'}><Ic name="down" size={16}/></button>
                          </div>
                        </div>
                        {drivers.length>1 &&
                          <div className="flex items-center gap-1 mt-1.5 pl-8">
                            <span className="text-[11px] text-slate2">Move to:</span>
                            <select value={d.id} onChange={e=>reassign(j.id,e.target.value)} className="text-[11px] border border-gray-200 rounded-lg px-1 py-0.5 bg-white text-ink">
                              {drivers.map(dr=><option key={dr.id} value={dr.id}>{dr.name}</option>)}</select>
                          </div>}
                      </div>);
                  })}
                </div>}
            </div>);
        })}
      </div>
    </div>
  );
}

/* =================================================================== */
/*  ROOT                                                              */
/* =================================================================== */
function App() {
  const [view,setView]=useState('landing');
  const [driver,setDriver]=useState(null);
  const [jobs,setJobs]=useState(INITIAL_JOBS);
  const [orders,setOrders]=useState(INITIAL_ORDERS);
  const [rates,setRates]=useState(INITIAL_RATES);
  const [drivers,setDrivers]=useState(DRIVERS);
  const [audit,setAudit]=useState([]);
  const addAudit=useCallback(text=>setAudit(prev=>[{time:now(),text},...prev]),[]);
  const addOrder=useCallback(o=>setOrders(prev=>[o,...prev]),[]);
  const updateOrder=useCallback((id,patch)=>setOrders(prev=>prev.map(o=>o.id===id?{...o,...patch}:o)),[]);
  const addJob=useCallback(j=>{
    if (j.type==='collection') {
      const orderId='o'+Date.now(); // boss booking -> Pending Collection order, linked to the driver job
      setOrders(prev=>[{ id:orderId, customerId:j.customerId, services:[], extras:[], needsPricing:false, addedItems:{}, firstOrder:false,
        bagsCount:0, bagWeights:[], weight:0, weightCharge:0, amount:0, initialAmount:0,
        packaging:j.packaging, paymentMethod:'—', paidInAdvance:j.paidInAdvance, collectedDate:null, collectedAt:null,
        dueDate:j.returnDate||addDays(TODAY,2), status:'Pending Collection', notes:j.instructions }, ...prev]);
      setJobs(prev=>{ const n=prev.filter(x=>x.driverId===j.driverId).length; return [...prev,{...j,orderId,seq:n+1}]; });
    } else {
      setJobs(prev=>{ const n=prev.filter(x=>x.driverId===j.driverId).length; return [...prev,{...j,seq:n+1}]; });
    }
  },[]);
  const go=useCallback(v=>setView(v),[]);

  if (view==='landing')      return <Landing go={go}/>;
  if (view==='driver-login') return <DriverLogin go={go} onLogin={d=>{setDriver(d);go('driver-app');}}/>;
  if (view==='driver-app')   return <DriverApp driver={driver} go={go} jobs={jobs} setJobs={setJobs} rates={rates} addAudit={addAudit} addOrder={addOrder} updateOrder={updateOrder}/>;
  if (view==='store-login')  return <StoreLogin go={go} onLogin={()=>go('store-app')}/>;
  if (view==='store-app')    return <StoreApp go={go} orders={orders} rates={rates} updateOrder={updateOrder} addAudit={addAudit}/>;
  if (view==='admin-login')  return <AdminLogin go={go} onLogin={()=>go('admin-app')}/>;
  if (view==='admin-app')    return <AdminApp go={go} jobs={jobs} setJobs={setJobs} rates={rates} setRates={setRates} audit={audit} drivers={drivers} setDrivers={setDrivers} orders={orders} addJob={addJob} updateOrder={updateOrder} addAudit={addAudit}/>;
  return null;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
